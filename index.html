<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DS Photography | Wedding, Event & Cinematic Photography</title>
    <link rel="icon" type="image/png" href="/icons.png" />

    <!-- Primary SEO -->
    <meta
      name="description"
      content="DS Photography offers professional wedding, event, pre-wedding and cinematic photography services. Capture your special moments with high-quality visuals and creative storytelling."
    />
    <meta
      name="keywords"
      content="DS Photography, wedding photography, event photography, cinematic photography, pre wedding shoot, professional photographer"
    />
    <meta name="author" content="DS Photography" />

    <!-- Google Verification (future use) -->
    <!-- <meta name="google-site-verification" content="YOUR_CODE_HERE" /> -->

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="DS Photography | Professional Wedding & Event Photography" />

      property="og:description"
      content="Professional wedding, event & cinematic photography services. Book DS Photography to capture unforgettable moments."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.dsphotography4u.vercel.app" />
    <meta property="og:image" content="https://www.dsphotography4u.vercel.app/icons.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DS Photography | Wedding & Event Photography" />
    <meta
      name="twitter:description"
      content="Capture your special moments with DS Photography – wedding, event & cinematic photography."
    />
    <meta name="twitter:image" content="https://www.dsphotography4u.vercel.app/og-image.jpg" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.dsphotography4u.vercel.app" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
